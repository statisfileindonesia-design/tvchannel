<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TV Otomatis</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:Arial; }
    
    #container {
      width:100%; height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory;
      -webkit-overflow-scrolling:touch;
    }
    
    .slide {
      width:100%; height:100vh; scroll-snap-align:start;
      display:flex; align-items:center; justify-content:center;
      background:#000; position:relative;
    }
    
    .slide video {
      width:100%; height:100%; object-fit:contain;
    }
    
    .label {
      position:absolute; top:20px; left:20px; z-index:10;
      background:rgba(0,0,0,0.7); color:#fff;
      padding:10px 20px; border-radius:25px; font-size:16px;
      pointer-events:none;
    }
    
    #fsBtn {
      position:fixed; bottom:30px; right:30px; z-index:100;
      background:#e74c3c; color:#fff; border:none;
      padding:15px 25px; border-radius:30px; font-size:16px;
      cursor:pointer;
    }
    
    #loading {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      color:#fff; font-size:20px; z-index:200;
    }
  </style>
</head>
<body>
  <div id="loading">⏳ Memuat channel...</div>
  <div id="container"></div>
  <button id="fsBtn" onclick="goFull()">🔲 Fullscreen</button>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const XOR_KEY = '25041995';
    const CDN_URL = 'https://cdn.jsdelivr.net/gh/statisfile-bit/tv-otomatis@main/database.json';
    
    let channels = [];
    let currentVideo = null;
    let currentHls = null;
    let soundUnlocked = false;

    // Dekripsi
    function decrypt(b64, key) {
      try {
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const keyBytes = new TextEncoder().encode(key);
        const out = new Uint8Array(bytes.length);
        for (let i = 0; i < bytes.length; i++) out[i] = bytes[i] ^ keyBytes[i % keyBytes.length];
        return new TextDecoder().decode(out);
      } catch (e) { return ''; }
    }

    // Buka kunci suara (harus dipicu oleh gestur pengguna)
    function unlockSound() {
      if (soundUnlocked) return;
      soundUnlocked = true;
      
      // Unmute semua video
      document.querySelectorAll('video').forEach(v => {
        v.muted = false;
        v.play().catch(()=>{});
      });
      
      console.log('🔊 Suara diaktifkan');
    }

    // Fullscreen
    function goFull() {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      document.getElementById('fsBtn').style.display = 'none';
      unlockSound();
    }

    // Stop video
    function stopVideo() {
      if (currentHls) { currentHls.destroy(); currentHls = null; }
      if (currentVideo) { 
        currentVideo.pause(); 
        currentVideo.removeAttribute('src'); 
        currentVideo = null; 
      }
    }

    // Play channel
    function playChannel(index) {
      if (index >= channels.length || index < 0) return;
      stopVideo();
      
      const video = document.getElementById('v' + index);
      if (!video) return;
      currentVideo = video;
      
      // Pertahankan status suara
      video.muted = !soundUnlocked;
      
      const link = channels[index].link;
      
      if (link.endsWith('.m3u8')) {
        if (Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(link);
          currentHls.attachMedia(video);
          currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(()=>{});
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = link;
          video.play().catch(()=>{});
        }
      } else {
        video.src = link;
        video.play().catch(()=>{});
      }
    }

    // Load data
    async function loadChannels() {
      try {
        const res = await fetch(CDN_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        
        const db = JSON.parse(await res.text());
        channels = db.data.map(item => ({
          nama: decrypt(item.NAMAE, XOR_KEY),
          link: decrypt(item.LINK, XOR_KEY)
        }));
        
        document.getElementById('loading').style.display = 'none';
        
        // Render
        const container = document.getElementById('container');
        container.innerHTML = channels.map((ch, i) => `
          <div class="slide">
            <div class="label">📺 ${ch.nama}</div>
            <video id="v${i}" playsinline muted loop></video>
          </div>
        `).join('');
        
        // Observer
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const idx = parseInt(entry.target.querySelector('video').id.replace('v',''));
              playChannel(idx);
            }
          });
        }, { threshold: 0.7 });
        
        document.querySelectorAll('.slide').forEach(s => observer.observe(s));
        
        // Auto-play pertama (muted dulu)
        setTimeout(() => playChannel(0), 500);
        
      } catch (e) {
        document.getElementById('loading').textContent = '❌ ' + e.message;
        console.error(e);
      }
    }

    // ========================================
    // AUTO UNLOCK SUARA
    // Begitu user scroll / klik / sentuh
    // ========================================
    
    // Scroll = suara aktif
    document.addEventListener('scroll', unlockSound, { once: false });
    
    // Klik pertama = suara aktif
    document.addEventListener('click', () => {
      unlockSound();
      // Double tap = fullscreen
      const now = Date.now();
      if (now - lastTap < 300 && document.fullscreenElement === null) goFull();
      lastTap = now;
    });
    
    // Sentuh pertama = suara aktif
    document.addEventListener('touchstart', unlockSound, { once: true });
    
    let lastTap = 0;

    window.onload = loadChannels;
  </script>
</body>
</html>
